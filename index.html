 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronoGaia - Production UI</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020208;
            font-family: 'Courier New', Courier, monospace;
            color: #00ffcc;
        }
        
        /* Master Viewport Layer containing the Real-Time Procedural Graphics Canvas */
        #viewport {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #020208;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }
        #gl-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        #earth-visual {
            position: relative;
            z-index: 3;
            font-size: 0.9rem;
            text-align: center;
            text-shadow: 0 0 8px #00ffcc;
            line-height: 1.6;
            max-width: 90%;
            margin-bottom: 70px;
            background: rgba(2, 2, 8, 0.7);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid rgba(0, 255, 204, 0.2);
        }

        /* Translucent Cyberpunk Glass HUD Panels */
        .hud-panel {
            position: absolute;
            background: rgba(2, 2, 8, 0.85);
            border: 1px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            border-radius: 6px;
            padding: 10px;
            z-index: 10;
            backdrop-filter: blur(8px);
        }
        #ticker-left { top: 15px; left: 15px; width: 52%; }
        #ticker-right { 
            top: 15px; 
            right: 15px; 
            text-align: right; 
            border-color: #ff9900; 
            color: #ff9900; 
            box-shadow: 0 0 15px rgba(255, 153, 0, 0.2); 
        }
        
        /* Interactive AI Command Console Input Box */
        #ai-console {
            bottom: 125px;
            left: 5%;
            width: 90%;
            display: flex;
            border-color: #00ffcc;
        }
        #ai-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: inherit;
            padding: 8px;
            outline: none;
            font-size: 0.8rem;
        }
        #ai-btn {
            background: #00ffcc;
            color: #020208;
            border: none;
            padding: 0 15px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* Bottom Time-Scrubber Control Panel */
        #controls-bottom {
            position: absolute;
            bottom: 25px;
            left: 5%;
            width: 90%;
            z-index: 10;
        }
        .label { font-size: 0.65rem; opacity: 0.7; letter-spacing: 2px; text-transform: uppercase; }
        .value { font-size: 0.95rem; font-weight: bold; margin-top: 2px; }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: rgba(0, 255, 204, 0.1);
            height: 6px;
            border-radius: 3px;
            outline: none;
            border: 1px solid #00ffcc;
            margin-top: 10px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #00ffcc;
            box-shadow: 0 0 10px #00ffcc;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <!-- Canvas for processing real-time background animation patterns -->
        <canvas id="gl-canvas"></canvas>
        <div id="earth-visual">CONNECTING TO GAIA REAL-TIME TIMELINE STREAM...</div>
    </div>

    <div id="ticker-left" class="hud-panel">
        <div class="label">AI CHRONO-STATUS</div>
        <div id="era-val" class="value">LOADING...</div>
    </div>

    <div id="ticker-right" class="hud-panel">
        <div class="label">TIMELINE YEAR</div>
        <div id="year-val" class="value">LOADING...</div>
    </div>

    <div id="ai-console" class="hud-panel">
        <input type="text" id="ai-input" placeholder="Query historical day data...">
        <button id="ai-btn">QUERY AI</button>
    </div>

    <div id="controls-bottom">
        <div class="label" style="text-align: center;">HOLD & DRAG TO WARP PLANET HISTORY</div>
        <input type="range" id="timeSlider" min="1" max="5" value="3" step="1">
    </div>

    <script>

        const aiInput = document.getElementById('ai-input');
        const aiBtn = document.getElementById('ai-btn');
        const canvas = document.getElementById('gl-canvas');
        const ctx = canvas.getContext('2d');

        const BACKEND_URL = window.location.origin;
        const DEVICE_ID = "mobile_user_dev_01";

        const eraMap = {
            1: "COSMIC ORIGIN",
            2: "TRETA YUGA",
            3: "DWAPARA YUGA",
            4: "PRESENT DAY",
            5: "FUTURE PROJECTION"
        };

        const timelineData = {
            1: { era: "COSMIC ORIGIN", year: "-4.5 BILLION YRS", color: "#ff3300", visual: "🌋 <b>EARTH BIRTH:</b> Planet forming from molten magma fields and solar system debris. Surface thermal fields active.", defaultQuery: "Analyze atmospheric composition at birth." },
            2: { era: "TRETA YUGA", year: "7000+ BCE", color: "#ffcc00", visual: "🏹 <b>TRETA YUGA:</b> Early forest ecosystems developing. Sri Rama's chronological journey loaded. Astronomical star alignments verified.", defaultQuery: "Show me the mapping of Ram Setu construction." },
            3: { era: "DWAPARA YUGA", year: "3102 BCE", color: "#00ccff", visual: "🔱 <b>DWAPARA YUGA:</b> Dense flora and stable continental layout. Sri Krishna's daily history module active. Underwater structures of Dwarka mapped.", defaultQuery: "Show me the underwater structure of Dwarka." },
            4: { era: "PRESENT DAY", year: "2026 AD", color: "#00ff66", visual: "🌍 <b>PRESENT DAY:</b> Global human infrastructure active. Real-time satellite imagery feeds tracking urban expansion and forest cover changes.", defaultQuery: "Show real-time global footprint expansion." },
            5: { era: "FUTURE PROJECTION", year: "+100 YEARS", color: "#cc00ff", visual: "🚀 <b>FUTURE PROJECTION:</b> Environmental predictive engine active. Calculating planetary shifts and technology expansion metrics.", defaultQuery: "Project family legacy 100 years forward." }
        };

        // Resize Canvas to fit mobile screens perfectly
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Canvas Generative Visual Matrix Effect
        let particleArray = [];
        function initParticles() {
            particleArray = [];
            for(let i=0; i<60; i++) {
                particleArray.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speedX: (Math.random() - 0.5) * 1
                });
            }
        }
        initParticles();

        function animateVisuals() {
            ctx.fillStyle = 'rgba(2, 2, 8, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const currentConfig = timelineData[slider.value];
            ctx.fillStyle = currentConfig.color;
            ctx.strokeStyle = currentConfig.color;

            // Draw a central glowing vector core simulating planetary energy fields
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2 - 40, 80, 0, Math.PI * 2);
            ctx.lineWidth = 0.5;
            ctx.stroke();

            particleArray.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                p.x += p.speedX;
                if(p.x > canvas.width) p.x = 0;
                if(p.x < 0) p.x = canvas.width;
            });

            requestAnimationFrame(animateVisuals);
        }
        animateVisuals();

            try {
                let res = await fetch(`${BACKEND_URL}/api/user/sync-init`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ device_id: DEVICE_ID })
                });
                let data = await res.json();
                slider.value = data.session_data.current_year_index;
                updateInterfaceLocal();
            } catch(e) {
                updateInterfaceLocal();
            }
        }
