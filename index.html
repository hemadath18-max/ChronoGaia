<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronoGaia - Cinematic Interface</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #020208; font-family: monospace; color: #00ffcc; }
        
        /* The Master Viewport with Integrated Video Player */
        #viewport {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; background: #020208;
            display: flex; justify-content: center; align-items: center; z-index: 1;
        }
        #bg-video {
            position: absolute;
            top: 50%; left: 50%; width: 100%; height: 100%;
            object-fit: cover; transform: translate(-50%, -50%);
            z-index: 2; opacity: 0.55;
        }
        #earth-visual {
            position: relative; z-index: 3; font-size: 0.95rem;
            text-align: center; text-shadow: 0 0 8px #00ffcc;
            line-height: 1.6; max-width: 90%; margin-bottom: 60px;
            background: rgba(2, 2, 8, 0.6); padding: 15px; border-radius: 6px;
        }
        .hud-panel { position: absolute; background: rgba(2, 2, 8, 0.85); border: 1px solid #00ffcc; border-radius: 6px; padding: 10px; z-index: 10; backdrop-filter: blur(8px); }
        #ticker-left { top: 15px; left: 15px; width: 52%; }
        #ticker-right { top: 15px; right: 15px; text-align: right; border-color: #ff9900; color: #ff9900; }
        #ai-console { bottom: 125px; left: 5%; width: 90%; display: flex; }
        #ai-input { flex: 1; background: transparent; border: none; color: #fff; padding: 8px; outline: none; font-family: inherit; }
        #ai-btn { background: #00ffcc; color: #020208; border: none; padding: 0 15px; font-weight: bold; cursor: pointer; }
        #controls-bottom { position: absolute; bottom: 25px; left: 5%; width: 90%; z-index: 10; }
        .label { font-size: 0.65rem; opacity: 0.7; letter-spacing: 2px; text-transform: uppercase; }
        .value { font-size: 0.95rem; font-weight: bold; margin-top: 2px; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: rgba(0, 255, 204, 0.1); height: 6px; border-radius: 3px; outline: none; border: 1px solid #00ffcc; margin-top: 10px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #00ffcc; }
    </style>
</head>
<body>

    <div id="viewport">
        <!-- Live Video Element Waiting for Content Links -->
        <video id="bg-video" autoplay loop muted playsinline>
            <source id="video-source" src="" type="video/mp4">
        </video>
        <div id="earth-visual">SYSTEM OK: READY TO INTERPOLATE VIDEO LAYERS...</div>
    </div>

    <div id="ticker-left" class="hud-panel"><div class="label">AI CHRONO-STATUS</div><div id="era-val" class="value">LOADING...</div></div>
    <div id="ticker-right" class="hud-panel"><div class="label">TIMELINE YEAR</div><div id="year-val" class="value">LOADING...</div></div>

    <div id="ai-console" class="hud-panel">
        <input type="text" id="ai-input" placeholder="Ask AI about plant evolution on this exact day...">
        <button id="ai-btn">QUERY AI</button>
    </div>

    <div id="controls-bottom">
        <div class="label" style="text-align: center;">HOLD & DRAG TO SEE PLANT EVOLUTION AND DEATH</div>
        <input type="range" id="timeSlider" min="1" max="3" value="1" step="1">
    </div>

    <script>
        const slider = document.getElementById('timeSlider');
        const eraDisplay = document.getElementById('era-val');
        const yearDisplay = document.getElementById('year-val');
        const visualDisplay = document.getElementById('earth-visual');
        const videoElement = document.getElementById('bg-video');
        const videoSource = document.getElementById('video-source');
        const aiInput = document.getElementById('ai-input');
        const aiBtn = document.getElementById('ai-btn');

        // Master Plant Evolution Data Dictionary
        // NOTE: Replace the video URLs below with real hosted mp4 links to watch them play!
        const timelineData = {
            1: {
                era: "PALEOZOIC ERA",
                year: "-450 MILLION YRS",
                video: "https://w3schools.com", // Test placeholder link
                visual: "🌱 <b>THE FIRST PLANTS:</b> Algae transitions onto bare rock. Primitive mosses and liverworts develop, creating the very first oxygen layers on land.",
                defaultQuery: "How did early land plants survive without soil?"
            },
            2: {
                era: "CARBONIFEROUS ERA",
                year: "-300 MILLION YRS",
                video: "https://w3schools.com", // Test placeholder link
                visual: "🌳 <b>MAXIMUM EVOLUTION:</b> Giant scale trees and dense, hyper-green swamp forests cover the globe, driving atmospheric oxygen to its highest levels in history.",
                defaultQuery: "Explain the size of trees in the Carboniferous era."
            },
            3: {
                era: "THE COLD END",
                year: "+4 BILLION YRS",
                video: "https://w3schools.com", // Test placeholder link
                visual: "🍂 <b>THE FINAL DEATH:</b> The sun expands and temperatures skyrocket. Photosynthesis breaks down completely, carbon dioxide plummets, and the last remaining plant life dries out forever.",
                defaultQuery: "What happens to the final plant species on Earth?"
            }
        };

        function updateTimeline() {
            const state = timelineData[slider.value];
            eraDisplay.textContent = state.era;
            yearDisplay.textContent = state.year;
            visualDisplay.innerHTML = state.visual;
            aiInput.value = state.defaultQuery;
            
            // Switch the background video stream data path
            videoSource.src = state.video;
            videoElement.load();
            videoElement.play().catch(err => console.log("Waiting for user tap to spin video player"));
        }

        slider.addEventListener('input', updateTimeline);
        updateTimeline();
    </script>
</body>
</html>
